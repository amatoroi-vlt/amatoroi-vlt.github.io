<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Pensieve</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      display: flex;
      font-family: 'Georgia', serif;
      background: #0d1117;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 240px;
      min-width: 240px;
      height: 100vh;
      background: #0d1117;
      border-right: 1px solid #21262d;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #sidebar-header {
      padding: 24px 20px 18px;
      border-bottom: 1px solid #21262d;
    }

    .site-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #e6edf3;
      line-height: 1.2;
    }

    .site-subtitle {
      font-size: 0.72rem;
      color: #6e7681;
      font-style: italic;
      margin-top: 3px;
    }

    .site-desc {
      margin-top: 14px;
      font-size: 0.67rem;
      color: #8b7d6b;
      line-height: 1.7;
      font-style: italic;
    }

    #nav {
      padding: 12px 12px;
      flex: 1;
    }

    .group-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #5c7a8a;
      padding: 4px 8px;
      margin-top: 16px;
      margin-bottom: 4px;
    }

    .file-item {
      display: block;
      padding: 6px 8px;
      font-size: 0.77rem;
      color: #8b949e;
      text-decoration: none;
      border-radius: 5px;
      cursor: pointer;
      line-height: 1.4;
      transition: background 0.1s, color 0.1s;
    }

    .file-item:hover {
      background: #161b22;
      color: #c9d1d9;
    }

    .file-item.active {
      background: #1c2432;
      color: #58a6ff;
    }

    /* ── Content ── */
    #content {
      flex: 1;
      height: 100vh;
      position: relative;
    }

    #report-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
      background: #f6f8fa;
    }

    #welcome {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f6f8fa;
      color: #8b949e;
      gap: 10px;
    }

    #welcome .wt {
      font-size: 2.2rem;
      color: #24292f;
      letter-spacing: -0.02em;
    }

    #welcome .ws {
      font-size: 0.85rem;
      color: #8b949e;
      font-style: italic;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div class="site-title">Pensieve</div>
    <div class="site-subtitle">for amatoroi only</div>
    <div class="site-desc">
      햇빛이여, 데이지여, 버터 멜로우여,<br>
      이 멍청한 인간이 기억하게 해라.
    </div>
  </div>
  <div id="nav"></div>
</div>

<div id="content">
  <div id="welcome">
    <div class="wt">Pensieve</div>
    <div class="ws">보고서를 선택하세요</div>
  </div>
  <iframe id="report-frame" src="about:blank"></iframe>
</div>

<script>
  const frame = document.getElementById('report-frame');
  const welcome = document.getElementById('welcome');
  const nav = document.getElementById('nav');
  let active = null;

  function load(path, el) {
    if (active) active.classList.remove('active');
    active = el;
    el.classList.add('active');
    welcome.style.display = 'none';
    frame.style.display = 'block';
    frame.src = path;
  }

  fetch('manifest.json')
    .then(r => r.json())
    .then(({ groups }) => {
      groups.forEach(({ name, files }) => {
        const label = document.createElement('div');
        label.className = 'group-label';
        label.textContent = name;
        nav.appendChild(label);

        files.forEach(({ name: title, path }) => {
          const a = document.createElement('a');
          a.className = 'file-item';
          a.textContent = title;
          a.onclick = () => load(path, a);
          nav.appendChild(a);
        });
      });
    })
    .catch(() => {
      nav.innerHTML = '<div style="padding:12px;font-size:0.72rem;color:#484f58">목록을 불러올 수 없습니다</div>';
    });
</script>

</body>
</html>
